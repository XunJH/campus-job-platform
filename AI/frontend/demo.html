<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI招聘助手 - 演示页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab:hover, .tab.active {
            background: white;
            color: #667eea;
        }
        .panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            display: none;
        }
        .panel.active {
            display: block;
        }
        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        /* Chat Styles */
        .chat-container {
            height: 400px;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }
        .message.user {
            margin-left: auto;
            text-align: right;
        }
        .message-content {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
        }
        .message.bot .message-content {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 5px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus {
            border-color: #667eea;
        }
        .send-btn {
            margin-left: 10px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .send-btn:hover {
            transform: scale(1.05);
        }
        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Questionnaires */
        .question-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .question-item {
            padding: 15px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .question-item h4 {
            color: #333;
            margin-bottom: 10px;
        }
        .option {
            display: block;
            padding: 8px 15px;
            margin: 5px 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover {
            border-color: #667eea;
        }
        .option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .action-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-btn:hover {
            transform: translateY(-2px);
        }
        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Jobs */
        .job-card {
            padding: 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }
        .job-card h4 {
            color: #333;
            margin-bottom: 8px;
        }
        .job-info {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }
        .job-score {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }
        .job-warnings {
            margin-top: 10px;
            padding: 10px;
            background: #fff3cd;
            border-radius: 8px;
            color: #856404;
            font-size: 13px;
        }

        /* Credit Score */
        .score-display {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
            margin-bottom: 20px;
        }
        .score-number {
            font-size: 72px;
            font-weight: bold;
        }
        .score-level {
            font-size: 24px;
            margin-top: 10px;
        }
        .score-breakdown {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .breakdown-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }
        .breakdown-item .label {
            color: #666;
            font-size: 12px;
        }
        .breakdown-item .value {
            color: #333;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }
        .breakdown-item .value.positive { color: #28a745; }
        .breakdown-item .value.negative { color: #dc3545; }

        /* Status */
        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus, .input-group textarea:focus {
            border-color: #667eea;
        }

        /* Profile Result */
        .profile-result {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-top: 20px;
        }
        .profile-result h3 {
            margin-bottom: 15px;
        }
        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .profile-tag {
            padding: 5px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI招聘助手</h1>
        <p class="subtitle">校园智能兼职平台 - 模块演示</p>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chat')">💬 AI对话</button>
            <button class="tab" onclick="switchTab('personality')">🧠 人格测试</button>
            <button class="tab" onclick="switchTab('jobs')">💼 岗位匹配</button>
            <button class="tab" onclick="switchTab('credit')">⭐ 信用评分</button>
            <button class="tab" onclick="switchTab('verify')">🛡️ 认证审核</button>
        </div>

        <!-- AI对话 -->
        <div id="chat" class="panel active">
            <h2>💬 AI对话助手</h2>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot">
                        <div class="message-content">👋 你好！我是AI招聘助手，有什么可以帮你的？<br><br>你可以问我：<br>• 找什么样的兼职<br>• 简历怎么写<br>• 薪资怎么谈<br>• 兼职注意事项</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>

        <!-- 人格测试 -->
        <div id="personality" class="panel">
            <h2>🧠 人格画像测试</h2>
            <div id="questionnaireSection">
                <button class="action-btn" onclick="loadQuestionnaire()">📋 开始测试</button>
            </div>
            <div id="profileResult"></div>
        </div>

        <!-- 岗位匹配 -->
        <div id="jobs" class="panel">
            <h2>💼 智能岗位匹配</h2>
            <div class="input-group">
                <label>你的人格画像（粘贴之前的分析结果）</label>
                <textarea id="profileInput" rows="4" placeholder='{"dimensions": {...}, "tags": [...], "summary": "..."}'></textarea>
            </div>
            <button class="action-btn" onclick="matchJobs()">🔍 获取推荐</button>
            <div id="jobsList"></div>
        </div>

        <!-- 信用评分 -->
        <div id="credit" class="panel">
            <h2>⭐ 信用评分</h2>
            <div class="input-group">
                <label>完成的兼职数</label>
                <input type="number" id="completedJobs" value="10" min="0">
            </div>
            <div class="input-group">
                <label>差评数</label>
                <input type="number" id="badReviews" value="0" min="0">
            </div>
            <div class="input-group">
                <label>违规次数</label>
                <input type="number" id="violations" value="0" min="0">
            </div>
            <div class="input-group">
                <label>平均评分 (1-5)</label>
                <input type="number" id="avgRating" value="4.8" step="0.1" min="1" max="5">
            </div>
            <button class="action-btn" onclick="calculateCredit()">📊 计算信用分</button>
            <div id="creditResult"></div>
        </div>

        <!-- 认证审核 -->
        <div id="verify" class="panel">
            <h2>🛡️ 虚假岗位检测</h2>
            <div class="input-group">
                <label>岗位名称</label>
                <input type="text" id="jobTitle" value="高薪打字员">
            </div>
            <div class="input-group">
                <label>公司名称</label>
                <input type="text" id="companyName" value="某某科技有限公司">
            </div>
            <div class="input-group">
                <label>薪资待遇</label>
                <input type="text" id="salary" value="日薪500-1000元">
            </div>
            <div class="input-group">
                <label>岗位描述</label>
                <textarea id="jobDesc" rows="3">足不出户，日入千元，适合学生兼职</textarea>
            </div>
            <button class="action-btn" onclick="checkFraud()">🔍 检测岗位安全性</button>
            <div id="fraudResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentUserId = 'demo_user';
        let chatHistory = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // ========== AI对话 ==========
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            // 添加用户消息
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML += `<div class="message user"><div class="message-content">${escapeHtml(message)}</div></div>`;
            chatHistory.push({ role: 'user', content: message });
            input.value = '';

            // 滚动到底部
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // 添加加载状态
            messagesDiv.innerHTML += `<div class="message bot" id="loadingMsg"><div class="message-content">⏳ AI思考中...</div></div>`;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch(`${API_BASE}/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        message: message,
                        history: chatHistory.slice(-10)
                    })
                });
                const data = await response.json();

                // 移除加载状态
                document.getElementById('loadingMsg').remove();

                if (data.code === 200) {
                    messagesDiv.innerHTML += `<div class="message bot"><div class="message-content">${escapeHtml(data.data.reply)}</div></div>`;
                    chatHistory.push({ role: 'assistant', content: data.data.reply });
                } else {
                    messagesDiv.innerHTML += `<div class="message bot"><div class="message-content">❌ 出错了：${data.detail || '未知错误'}</div></div>`;
                }
            } catch (e) {
                document.getElementById('loadingMsg').remove();
                messagesDiv.innerHTML += `<div class="message bot"><div class="message-content">❌ 无法连接后端服务，请确保服务已启动（uvicorn app.main:app --reload）</div></div>`;
            }

            btn.disabled = false;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // ========== 人格测试 ==========
        let currentQuestions = [];
        let userAnswers = {};

        async function loadQuestionnaire() {
            const section = document.getElementById('questionnaireSection');
            section.innerHTML = '<div class="status loading">⏳ 加载问卷中...</div>';

            try {
                const response = await fetch(`${API_BASE}/personality/questionnaire`);
                const data = await response.json();

                if (data.code === 200) {
                    currentQuestions = data.data.questions;
                    renderQuestions();
                }
            } catch (e) {
                section.innerHTML = '<div class="status error">❌ 无法连接后端服务</div>';
            }
        }

        function renderQuestions() {
            const section = document.getElementById('questionnaireSection');
            let html = '<div class="question-list">';

            currentQuestions.forEach((q, idx) => {
                html += `<div class="question-item">
                    <h4>${idx + 1}. ${q.question}</h4>
                    ${q.options.map((opt, optIdx) => `
                        <div class="option" onclick="selectOption(${idx}, ${optIdx}, this)">${opt}</div>
                    `).join('')}
                </div>`;
            });

            html += '</div>';
            html += '<button class="action-btn" onclick="submitPersonality()">📊 分析人格画像</button>';
            section.innerHTML = html;
        }

        function selectOption(qIdx, optIdx, el) {
            // 移除同题目的选中状态
            const siblings = el.parentElement.querySelectorAll('.option');
            siblings.forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');

            userAnswers[qIdx] = optIdx;
        }

        async function submitPersonality() {
            if (Object.keys(userAnswers).length < currentQuestions.length) {
                alert('请完成所有题目！');
                return;
            }

            const section = document.getElementById('questionnaireSection');
            const answers = Object.entries(userAnswers).map(([qId, opt]) => ({
                question_id: parseInt(qId) + 1,
                selected_option: opt
            }));

            section.innerHTML += '<div class="status loading">⏳ AI分析中...</div>';

            try {
                const response = await fetch(`${API_BASE}/personality/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        answers: answers
                    })
                });
                const data = await response.json();

                if (data.code === 200) {
                    renderProfileResult(data.data);
                }
            } catch (e) {
                section.innerHTML += '<div class="status error">❌ 分析失败</div>';
            }
        }

        function renderProfileResult(profile) {
            const resultDiv = document.getElementById('profileResult');
            resultDiv.innerHTML = `
                <div class="profile-result">
                    <h3>📋 你的性格画像</h3>
                    <p><strong>总结：</strong>${profile.summary}</p>
                    <p><strong>优势：</strong>${profile.strengths?.join('、') || '暂无'}</p>
                    <p><strong>适合岗位：</strong>${profile.suitable_jobs?.join('、') || '暂无'}</p>
                    <div class="profile-tags">
                        ${profile.tags?.map(t => `<span class="profile-tag">${t}</span>`).join('') || ''}
                    </div>
                </div>
            `;
        }

        // ========== 岗位匹配 ==========
        async function matchJobs() {
            const profileText = document.getElementById('profileInput').value;
            const jobsDiv = document.getElementById('jobsList');
            jobsDiv.innerHTML = '<div class="status loading">⏳ 匹配中...</div>';

            let profile = null;
            try {
                profile = JSON.parse(profileText);
            } catch (e) {
                jobsDiv.innerHTML = '<div class="status error">❌ 请输入有效的人格画像JSON</div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/matching/recommend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        personality_profile: profile,
                        top_n: 5
                    })
                });
                const data = await response.json();

                if (data.code === 200) {
                    renderJobs(data.data.recommendations);
                }
            } catch (e) {
                jobsDiv.innerHTML = '<div class="status error">❌ 无法连接后端服务</div>';
            }
        }

        function renderJobs(jobs) {
            const jobsDiv = document.getElementById('jobsList');
            if (!jobs || jobs.length === 0) {
                jobsDiv.innerHTML = '<div class="status">暂无推荐岗位</div>';
                return;
            }

            let html = '';
            jobs.forEach(job => {
                const matchReasons = job.match_reasons?.length
                    ? `<div class="job-info" style="color:#666;font-size:13px;margin-top:4px">💡 ${job.match_reasons.join(' | ')}</div>`
                    : '';
                html += `
                    <div class="job-card">
                        <h4>${job.job.title}</h4>
                        <div class="job-info">🏢 ${job.job.company}</div>
                        <div class="job-info">🏷️ ${job.job.tags?.join('、') || '暂无标签'}</div>
                        ${matchReasons}
                        <span class="job-score">匹配度 ${job.match_score.toFixed(0)}%</span>
                        ${job.warnings?.length ? `<div class="job-warnings">⚠️ ${job.warnings.join(' ')}</div>` : ''}
                    </div>
                `;
            });

            jobsDiv.innerHTML = html;
        }

        // ========== 信用评分 ==========
        async function calculateCredit() {
            const resultDiv = document.getElementById('creditResult');
            resultDiv.innerHTML = '<div class="status loading">⏳ 计算中...</div>';

            try {
                const response = await fetch(`${API_BASE}/verification/credit-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUserId,
                        completed_jobs: parseInt(document.getElementById('completedJobs').value),
                        bad_reviews: parseInt(document.getElementById('badReviews').value),
                        violation_count: parseInt(document.getElementById('violations').value),
                        avg_rating: parseFloat(document.getElementById('avgRating').value)
                    })
                });
                const data = await response.json();

                if (data.code === 200) {
                    renderCreditResult(data.data);
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="status error">❌ 无法连接后端服务</div>';
            }
        }

        function renderCreditResult(credit) {
            const resultDiv = document.getElementById('creditResult');
            resultDiv.innerHTML = `
                <div class="score-display">
                    <div class="score-number">${credit.credit_score}</div>
                    <div class="score-level">${credit.credit_level}</div>
                </div>
                <div class="score-breakdown">
                    <div class="breakdown-item">
                        <div class="label">基础分</div>
                        <div class="value">${credit.breakdown.base_score}</div>
                    </div>
                    <div class="breakdown-item">
                        <div class="label">完成兼职加分</div>
                        <div class="value positive">+${credit.breakdown.job_bonus}</div>
                    </div>
                    <div class="breakdown-item">
                        <div class="label">差评扣分</div>
                        <div class="value negative">-${credit.breakdown.review_penalty}</div>
                    </div>
                    <div class="breakdown-item">
                        <div class="label">违规扣分</div>
                        <div class="value negative">-${credit.breakdown.violation_penalty}</div>
                    </div>
                </div>
                <div class="status success">
                    💡 ${credit.suggestions?.join('<br>• ')}
                </div>
            `;
        }

        // ========== 虚假岗位检测 ==========
        async function checkFraud() {
            const resultDiv = document.getElementById('fraudResult');
            resultDiv.innerHTML = '<div class="status loading">⏳ 检测中...</div>';

            try {
                const response = await fetch(`${API_BASE}/verification/fraud-check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_id: "demo_job",
                        title: document.getElementById('jobTitle').value,
                        company: document.getElementById('companyName').value,
                        salary: document.getElementById('salary').value,
                        description: document.getElementById('jobDesc').value,
                        requirements: []
                    })
                });
                const data = await response.json();

                if (data.code === 200) {
                    renderFraudResult(data.data);
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="status error">❌ 无法连接后端服务</div>';
            }
        }

        function renderFraudResult(result) {
            const resultDiv = document.getElementById('fraudResult');
            const riskColors = { low: '#28a745', medium: '#ffc107', high: '#dc3545' };
            const riskLabels = { low: '✅ 低风险', medium: '⚠️ 中风险', high: '🚨 高风险' };

            resultDiv.innerHTML = `
                <div class="profile-result" style="background: ${riskColors[result.risk_level]}">
                    <h3>${riskLabels[result.risk_level]}</h3>
                    <p><strong>可疑度：</strong>${result.is_suspicious ? '是' : '否'}</p>
                    <p><strong>建议：</strong>${result.recommendation}</p>
                    ${result.warning_signs?.length ? `<p><strong>警示信号：</strong></p><ul>${result.warning_signs.map(w => `<li>${w}</li>`).join('')}</ul>` : ''}
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
