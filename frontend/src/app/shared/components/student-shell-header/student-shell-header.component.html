<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-6">
    <div class="flex items-center gap-8">
      <a routerLink="/student/jobs" class="text-xl font-bold text-[#1A365D] no-underline">
        校园招聘
      </a>

      <nav class="hidden items-center gap-2 md:flex">
        <a
          routerLink="/student/jobs"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('jobs')"
          [class.text-white]="isActive('jobs')"
          [class.text-slate-600]="!isActive('jobs')"
          [class.hover:bg-slate-100]="!isActive('jobs')"
        >
          岗位广场
        </a>
        <a
          routerLink="/student/applications"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('applications')"
          [class.text-white]="isActive('applications')"
          [class.text-slate-600]="!isActive('applications')"
          [class.hover:bg-slate-100]="!isActive('applications')"
        >
          我的投递
        </a>
        <a
          routerLink="/student/favorites"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('favorites')"
          [class.text-white]="isActive('favorites')"
          [class.text-slate-600]="!isActive('favorites')"
          [class.hover:bg-slate-100]="!isActive('favorites')"
        >
          我的收藏
        </a>
        <a
          routerLink="/student/wallet"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('wallet')"
          [class.text-white]="isActive('wallet')"
          [class.text-slate-600]="!isActive('wallet')"
          [class.hover:bg-slate-100]="!isActive('wallet')"
        >
          收入记录
        </a>
        <a
          *ngIf="appealsEnabled"
          routerLink="/student/tickets"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('tickets')"
          [class.text-white]="isActive('tickets')"
          [class.text-slate-600]="!isActive('tickets')"
          [class.hover:bg-slate-100]="!isActive('tickets')"
        >
          申诉工单
        </a>
        <a
          routerLink="/student/resume"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('resume')"
          [class.text-white]="isActive('resume')"
          [class.text-slate-600]="!isActive('resume')"
          [class.hover:bg-slate-100]="!isActive('resume')"
        >
          简历资料
        </a>
        <a
          *ngIf="aiAssistantEnabled"
          routerLink="/student/ai"
          class="rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
          [class.bg-slate-900]="isActive('ai')"
          [class.text-white]="isActive('ai')"
          [class.text-slate-600]="!isActive('ai')"
          [class.hover:bg-slate-100]="!isActive('ai')"
        >
          求职辅助
        </a>
      </nav>
    </div>

    <div class="flex items-center gap-3">
      <a
        routerLink="/student/notifications"
        class="relative flex h-9 w-9 items-center justify-center rounded-full border no-underline transition-colors"
        [class.border-slate-900]="isActive('notifications')"
        [class.bg-slate-900]="isActive('notifications')"
        [class.text-white]="isActive('notifications')"
        [class.border-slate-200]="!isActive('notifications')"
        [class.bg-slate-50]="!isActive('notifications')"
        [class.text-[#1A365D]]="!isActive('notifications')"
        title="系统通知"
      >
        <span class="material-symbols-outlined text-[18px]">notifications</span>
        <span
          *ngIf="unreadNotificationCount > 0"
          class="absolute -right-1 -top-1 inline-flex min-h-[18px] min-w-[18px] items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-semibold leading-none text-white"
        >
          {{ unreadNotificationLabel }}
        </span>
      </a>
      <a
        routerLink="/student/messages"
        class="relative flex h-9 w-9 items-center justify-center rounded-full border no-underline transition-colors"
        [class.border-slate-900]="isActive('messages')"
        [class.bg-slate-900]="isActive('messages')"
        [class.text-white]="isActive('messages')"
        [class.border-slate-200]="!isActive('messages')"
        [class.bg-slate-50]="!isActive('messages')"
        [class.text-[#1A365D]]="!isActive('messages')"
        title="沟通渠道"
      >
        <span class="material-symbols-outlined text-[18px]">chat_bubble</span>
        <span
          *ngIf="unreadMessageCount > 0"
          class="absolute -right-1 -top-1 inline-flex min-h-[18px] min-w-[18px] items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-semibold leading-none text-white"
        >
          {{ unreadMessageLabel }}
        </span>
      </a>
      <a
        routerLink="/student/resume"
        class="flex h-9 w-9 items-center justify-center rounded-full border border-slate-200 bg-slate-50 text-[#1A365D] no-underline"
        title="个人资料"
      >
        <span class="material-symbols-outlined text-[18px]">person</span>
      </a>
      <button
        type="button"
        (click)="logout()"
        class="inline-flex items-center gap-1 rounded-full border border-slate-200 px-3 py-2 text-sm text-slate-600 transition-colors hover:border-rose-200 hover:bg-rose-50 hover:text-rose-600"
        title="退出登录"
      >
        <span class="material-symbols-outlined text-[18px]">logout</span>
        <span class="hidden sm:inline">退出</span>
      </button>
    </div>
  </div>

  <div class="border-t border-slate-100 px-4 py-3 md:hidden">
    <nav class="mx-auto flex max-w-7xl gap-2 overflow-x-auto">
      <a
        routerLink="/student/jobs"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('jobs')"
        [class.text-white]="isActive('jobs')"
        [class.bg-slate-100]="!isActive('jobs')"
        [class.text-slate-600]="!isActive('jobs')"
      >
        岗位
      </a>
      <a
        routerLink="/student/applications"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('applications')"
        [class.text-white]="isActive('applications')"
        [class.bg-slate-100]="!isActive('applications')"
        [class.text-slate-600]="!isActive('applications')"
      >
        投递
      </a>
      <a
        routerLink="/student/favorites"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('favorites')"
        [class.text-white]="isActive('favorites')"
        [class.bg-slate-100]="!isActive('favorites')"
        [class.text-slate-600]="!isActive('favorites')"
      >
        收藏
      </a>
      <a
        routerLink="/student/wallet"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('wallet')"
        [class.text-white]="isActive('wallet')"
        [class.bg-slate-100]="!isActive('wallet')"
        [class.text-slate-600]="!isActive('wallet')"
      >
        收入
      </a>
      <a
        routerLink="/student/notifications"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('notifications')"
        [class.text-white]="isActive('notifications')"
        [class.bg-slate-100]="!isActive('notifications')"
        [class.text-slate-600]="!isActive('notifications')"
      >
        通知
      </a>
      <a
        *ngIf="appealsEnabled"
        routerLink="/student/tickets"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('tickets')"
        [class.text-white]="isActive('tickets')"
        [class.bg-slate-100]="!isActive('tickets')"
        [class.text-slate-600]="!isActive('tickets')"
      >
        申诉
      </a>
      <a
        routerLink="/student/resume"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('resume')"
        [class.text-white]="isActive('resume')"
        [class.bg-slate-100]="!isActive('resume')"
        [class.text-slate-600]="!isActive('resume')"
      >
        简历
      </a>
      <a
        *ngIf="aiAssistantEnabled"
        routerLink="/student/ai"
        class="whitespace-nowrap rounded-full px-4 py-2 text-sm font-medium no-underline transition-colors"
        [class.bg-slate-900]="isActive('ai')"
        [class.text-white]="isActive('ai')"
        [class.bg-slate-100]="!isActive('ai')"
        [class.text-slate-600]="!isActive('ai')"
      >
        AI
      </a>
    </nav>
  </div>
</header>
