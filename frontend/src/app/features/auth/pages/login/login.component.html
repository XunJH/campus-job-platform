<div class="min-h-screen w-full relative flex items-center justify-end">
  <!-- Full-screen Background Image -->
  <div class="absolute inset-0">
    <img
      src="assets/images/login-bg.jpg"
      class="w-full h-full object-cover object-center"
      alt="校园招聘平台"
    />
  </div>

  <!-- Right-side Login Card -->
  <div class="relative z-10 w-full max-w-[460px] mr-4 sm:mr-8 lg:mr-16 xl:mr-24 my-6 px-4">
    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl border border-white/30 p-6 sm:p-8">
      <!-- Header -->
      <div class="flex flex-col items-center mb-6">
        <div class="w-12 h-12 rounded-xl bg-primary flex items-center justify-center mb-3 shadow-lg">
          <span class="material-symbols-outlined text-white text-2xl">school</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">校园招聘平台</h1>
        <p class="text-sm text-gray-500 mt-1">连接校园与职场的桥梁</p>
      </div>

      <!-- Error Message -->
      <div
        *ngIf="errorMessage"
        class="mb-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm font-medium flex items-center gap-2"
      >
        <span class="material-symbols-outlined text-base">error</span>
        {{ errorMessage }}
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Username -->
        <div class="space-y-1.5">
          <label class="text-xs font-medium text-gray-600">用户名或邮箱</label>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[18px]"
            >
              person
            </span>
            <input
              type="text"
              formControlName="username"
              class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none bg-gray-50/50 text-sm"
              placeholder="请输入用户名或邮箱"
              [class.border-red-400]="f['username'].touched && f['username'].invalid"
            />
          </div>
          <div *ngIf="f['username'].touched && f['username'].invalid" class="text-red-500 text-xs">
            <span *ngIf="f['username'].errors?.['required']">用户名不能为空</span>
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1.5">
          <div class="flex justify-between items-center">
            <label class="text-xs font-medium text-gray-600">密码</label>
            <a routerLink="/auth/forgot-password" class="text-xs text-primary hover:underline">忘记密码？</a>
          </div>
          <div class="relative">
            <span
              class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[18px]"
            >
              lock
            </span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="w-full pl-10 pr-10 py-2.5 rounded-lg border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all outline-none bg-gray-50/50 text-sm"
              placeholder="请输入密码"
              [class.border-red-400]="f['password'].touched && f['password'].invalid"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors !border-0 outline-none"
            >
              <span class="material-symbols-outlined text-[18px]">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
          <div *ngIf="f['password'].touched && f['password'].invalid" class="text-red-500 text-xs">
            <span *ngIf="f['password'].errors?.['required']">密码不能为空</span>
            <span *ngIf="f['password'].errors?.['minlength']">密码至少6位</span>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center gap-2">
          <input
            type="checkbox"
            formControlName="remember"
            class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary"
            id="remember"
          />
          <label for="remember" class="text-sm text-gray-600 select-none">保持登录状态</label>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary text-white py-3 rounded-lg font-semibold text-sm hover:bg-[#1A365D] active:scale-[0.98] transition-all shadow-md !border-0"
          [disabled]="isLoading"
        >
          <span *ngIf="!isLoading">登录</span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            登录中...
          </span>
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-6 pt-5 border-t border-gray-100 text-center space-y-3">
        <p class="text-sm text-gray-500">
          还没有账号？
          <a routerLink="/auth/register" class="text-primary font-semibold hover:underline">立即注册</a>
        </p>
        <div class="flex justify-center gap-4 text-xs text-gray-400">
          <a href="#" class="hover:text-gray-600 transition-colors">隐私政策</a>
          <span class="text-gray-300">|</span>
          <a href="#" class="hover:text-gray-600 transition-colors">服务条款</a>
          <span class="text-gray-300">|</span>
          <a href="#" class="hover:text-gray-600 transition-colors">帮助中心</a>
        </div>
      </div>
    </div>
  </div>
</div>
