<div class="auth-page">
  <!-- Subtle background dots -->
  <div class="auth-bg"></div>

  <!-- Nav -->
  <nav class="auth-nav">
    <a routerLink="/" class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 7v10l8 5 8-5V7L12 2z" fill="currentColor" />
      </svg>
      <span>CampusJob</span>
    </a>
  </nav>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="form-header">
        <h2>欢迎回来</h2>
        <p>登录你的账号继续探索机会</p>
      </div>

      <div class="message message-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label for="username">用户名 / 邮箱</label>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="请输入用户名或邮箱"
            [class.error]="f['username'].touched && f['username'].invalid"
          />
          <div class="error-text" *ngIf="f['username'].touched && f['username'].invalid">
            <span *ngIf="f['username'].errors?.['required']">用户名不能为空</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <div class="password-input">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="请输入密码"
              [class.error]="f['password'].touched && f['password'].invalid"
            />
            <button type="button" class="toggle-password" (click)="togglePassword()">
              <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>
              </svg>
            </button>
          </div>
          <div class="error-text" *ngIf="f['password'].touched && f['password'].invalid">
            <span *ngIf="f['password'].errors?.['required']">密码不能为空</span>
            <span *ngIf="f['password'].errors?.['minlength']">密码至少6位</span>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="remember" />
            <span>记住我</span>
          </label>
          <a routerLink="/forgot-password" class="link">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading">登录</span>
          <span *ngIf="isLoading">登录中...</span>
        </button>
      </form>

      <div class="form-footer">
        <p>还没有账号？<a routerLink="/auth/register" class="link">立即注册</a></p>
      </div>
    </div>
  </main>
</div>
