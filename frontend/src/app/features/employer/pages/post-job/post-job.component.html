<div class="page-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 7v10l8 5 8-5V7L12 2z" fill="currentColor" />
        </svg>
        <span>CampusJob</span>
      </div>
    </div>

    <div class="sidebar-content">
      <nav class="nav-section">
        <a routerLink="/employer/dashboard" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect width="7" height="9" x="3" y="3" rx="1"/>
            <rect width="7" height="5" x="14" y="3" rx="1"/>
            <rect width="7" height="9" x="14" y="12" rx="1"/>
            <rect width="7" height="5" x="3" y="16" rx="1"/>
          </svg>
          <span>企业首页</span>
        </a>
        <a routerLink="/employer/jobs/post" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>发布岗位</span>
        </a>
        <a routerLink="/employer/jobs" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <span>岗位管理</span>
        </a>
        <a routerLink="/employer/applications" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>申请管理</span>
        </a>
      </nav>

      <div class="nav-divider"></div>

      <nav class="nav-section">
        <p class="nav-label">企业中心</p>
        <a routerLink="/student/verification" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>企业认证</span>
        </a>
        <a routerLink="/employer/profile" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>企业资料</span>
        </a>
        <a routerLink="/employer/wallet" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/>
            <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/>
            <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
          </svg>
          <span>资金管理</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" x2="9" y1="12" y2="12"/>
        </svg>
        <span>退出登录</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="page-header">
      <div class="header-left">
        <button class="back-btn" routerLink="/employer/dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m15 18-6-6 6-6"/>
          </svg>
        </button>
        <h1>发布新岗位</h1>
      </div>
    </header>

    <!-- Content -->
    <div class="content-area">
      <!-- Message -->
      <div class="message" [class.message-success]="!error" [class.message-error]="error" *ngIf="message">
        {{ message }}
      </div>

      <!-- Form Card -->
      <div class="form-card">
        <form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="job-form">
          <!-- Basic Info Section -->
          <div class="form-section">
            <h3>基本信息</h3>
            
            <div class="form-group full-width">
              <label for="title">岗位标题 <span class="required">*</span></label>
              <input 
                type="text" 
                id="title"
                formControlName="title"
                placeholder="例如：兼职文案编辑、校园推广专员"
                [class.error]="postForm.get('title')?.invalid && postForm.get('title')?.touched"
              >
              <div class="error-text" *ngIf="postForm.get('title')?.invalid && postForm.get('title')?.touched">
                请输入岗位标题
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="location">工作地点 <span class="required">*</span></label>
                <div class="input-with-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                    <circle cx="12" cy="10" r="3"/>
                  </svg>
                  <input 
                    type="text" 
                    id="location"
                    formControlName="location"
                    placeholder="例如：北京市海淀区"
                    [class.error]="postForm.get('location')?.invalid && postForm.get('location')?.touched"
                  >
                </div>
                <div class="error-text" *ngIf="postForm.get('location')?.invalid && postForm.get('location')?.touched">
                  请输入工作地点
                </div>
              </div>

              <div class="form-group">
                <label for="jobType">工作类型 <span class="required">*</span></label>
                <select formControlName="jobType" id="jobType">
                  <option value="part_time">兼职</option>
                  <option value="full_time">全职</option>
                  <option value="internship">实习</option>
                  <option value="temporary">临时</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Salary Section -->
          <div class="form-section">
            <h3>薪资待遇</h3>
            
            <div class="form-row">
              <div class="form-group">
                <label for="salary">薪资数额 <span class="required">*</span></label>
                <div class="input-with-prefix">
                  <span class="prefix">¥</span>
                  <input 
                    type="number" 
                    id="salary"
                    formControlName="salary"
                    placeholder="例如：5000"
                    [class.error]="postForm.get('salary')?.invalid && postForm.get('salary')?.touched"
                  >
                </div>
                <div class="error-text" *ngIf="postForm.get('salary')?.invalid && postForm.get('salary')?.touched">
                  请输入有效薪资
                </div>
              </div>

              <div class="form-group">
                <label for="salaryType">薪资类型 <span class="required">*</span></label>
                <select formControlName="salaryType" id="salaryType">
                  <option value="hourly">时薪</option>
                  <option value="daily">日薪</option>
                  <option value="weekly">周薪</option>
                  <option value="monthly">月薪</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="workingHours">工作时间</label>
              <div class="input-with-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <input 
                  type="text" 
                  id="workingHours"
                  formControlName="workingHours"
                  placeholder="例如：周一至周五 9:00-18:00"
                >
              </div>
            </div>

            <div class="form-group">
              <label for="deadline">截止日期</label>
              <div class="input-with-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/>
                  <line x1="16" x2="16" y1="2" y2="6"/>
                  <line x1="8" x2="8" y1="2" y2="6"/>
                  <line x1="3" x2="21" y1="10" y2="10"/>
                </svg>
                <input 
                  type="date" 
                  id="deadline"
                  formControlName="deadline"
                >
              </div>
            </div>
          </div>

          <!-- Description Section -->
          <div class="form-section">
            <h3>岗位详情</h3>
            
            <div class="form-group full-width">
              <label for="requirements">岗位要求 <span class="required">*</span></label>
              <textarea 
                id="requirements"
                formControlName="requirements"
                rows="4"
                placeholder="请输入对求职者的要求，例如：&#10;- 本科及以上学历&#10;- 熟练使用Office办公软件&#10;- 良好的沟通能力"
                [class.error]="postForm.get('requirements')?.invalid && postForm.get('requirements')?.touched"
              ></textarea>
              <div class="error-text" *ngIf="postForm.get('requirements')?.invalid && postForm.get('requirements')?.touched">
                请输入岗位要求
              </div>
            </div>

            <div class="form-group full-width">
              <label for="description">岗位描述 <span class="required">*</span></label>
              <textarea 
                id="description"
                formControlName="description"
                rows="6"
                placeholder="请输入岗位详细描述，包括工作内容、团队介绍、发展空间等"
                [class.error]="postForm.get('description')?.invalid && postForm.get('description')?.touched"
              ></textarea>
              <div class="error-text" *ngIf="postForm.get('description')?.invalid && postForm.get('description')?.touched">
                请输入岗位描述
              </div>
            </div>
          </div>

          <!-- Form Actions -->
          <div class="form-actions">
            <button type="button" class="btn btn-outline" routerLink="/employer/dashboard">
              取消
            </button>
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="isSubmitting || postForm.invalid">
              <span *ngIf="!isSubmitting">发布岗位</span>
              <span *ngIf="isSubmitting">发布中...</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
