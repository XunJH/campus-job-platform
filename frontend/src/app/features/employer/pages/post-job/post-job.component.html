<div class="flex min-h-screen bg-background">
  <app-employer-shell-sidebar></app-employer-shell-sidebar>

  <main class="ml-64 flex-1 p-8">
    <div class="mx-auto max-w-4xl">
      <div class="mb-8 flex items-center gap-3">
        <a routerLink="/employer/jobs" class="inline-flex items-center text-slate-400 hover:text-[#1A365D]">
          <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <div>
          <h1 class="text-3xl font-bold text-[#1A365D]">{{ isEditMode ? '编辑岗位' : '发布岗位' }}</h1>
          <p class="mt-2 text-slate-500">{{ isEditMode ? '修改岗位信息并保存。' : '创建一个清晰、完整、便于学生理解的岗位。' }}</p>
        </div>
      </div>

      <div *ngIf="loading" class="flex justify-center rounded-2xl border border-slate-100 bg-white p-16">
        <span class="material-symbols-outlined animate-spin text-4xl text-[#1A365D]">progress_activity</span>
      </div>

      <div *ngIf="message" class="mb-6 rounded-xl px-4 py-3 text-sm"
        [class.border]="true"
        [class.bg-green-50]="!error"
        [class.border-green-100]="!error"
        [class.text-green-700]="!error"
        [class.bg-rose-50]="error"
        [class.border-rose-100]="error"
        [class.text-rose-700]="error">
        {{ message }}
      </div>

      <form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="space-y-6" *ngIf="!loading">
        <section class="rounded-2xl border border-slate-100 bg-white p-8 shadow-sm">
          <h2 class="mb-6 text-2xl font-bold text-[#1A365D]">基础信息</h2>
          <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div class="md:col-span-2">
              <label class="mb-2 block text-sm font-medium text-slate-700">岗位标题</label>
              <input type="text" formControlName="title" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="例如：校园推广专员" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">工作类型</label>
              <select formControlName="jobType" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-[#1A365D]">
                <option value="part_time">兼职</option>
                <option value="full_time">全职</option>
                <option value="internship">实习</option>
                <option value="temporary">临时</option>
              </select>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">工作地点类型</label>
              <select formControlName="workLocation" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-[#1A365D]">
                <option *ngFor="let location of workLocations" [value]="location.value">{{ location.label }}</option>
              </select>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">岗位类别</label>
              <select formControlName="category" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-[#1A365D]">
                <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
              </select>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">工作地点</label>
              <input type="text" formControlName="location" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="例如：海淀区 / 校内 / 线上" />
            </div>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-100 bg-white p-8 shadow-sm">
          <h2 class="mb-6 text-2xl font-bold text-[#1A365D]">薪资与安排</h2>
          <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">薪资金额</label>
              <div class="flex overflow-hidden rounded-xl border border-slate-200">
                <span class="inline-flex items-center bg-slate-50 px-4 text-slate-500">¥</span>
                <input type="number" formControlName="salary" class="w-full px-4 py-3 text-sm outline-none" placeholder="0" />
              </div>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">薪资类型</label>
              <select formControlName="salaryType" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm outline-none focus:border-[#1A365D]">
                <option value="hourly">时薪</option>
                <option value="daily">日薪</option>
                <option value="weekly">周薪</option>
                <option value="monthly">月薪</option>
              </select>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">工作时间</label>
              <input type="text" formControlName="workingHours" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="例如：周一至周五 9:00-18:00" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">截止日期</label>
              <input type="date" formControlName="deadline" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" />
            </div>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-100 bg-white p-8 shadow-sm">
          <div class="mb-6 flex items-center gap-2">
            <span class="material-symbols-outlined text-[#1A365D]">auto_fix_high</span>
            <h2 class="text-2xl font-bold text-[#1A365D]">辅助生成岗位描述</h2>
          </div>

          <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">关键词</label>
              <input [(ngModel)]="jdKeywords" [ngModelOptions]="{ standalone: true }" type="text" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="例如：Python、数据分析、远程" />
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">公司 / 岗位类型</label>
              <input [(ngModel)]="jdCompanyType" [ngModelOptions]="{ standalone: true }" type="text" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="例如：互联网公司、教育机构" />
            </div>
          </div>

          <div class="mt-6 flex items-center gap-4">
            <button type="button" (click)="generateJd()" [disabled]="jdLoading || !postForm.value.title" class="rounded-xl bg-[#1A365D] px-5 py-3 text-sm font-semibold text-white hover:opacity-90 disabled:opacity-50">
              {{ jdLoading ? '生成中...' : '生成岗位描述' }}
            </button>
            <p class="text-sm text-slate-500">会自动把生成结果填入下方描述和要求。</p>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-100 bg-white p-8 shadow-sm">
          <h2 class="mb-6 text-2xl font-bold text-[#1A365D]">详细描述</h2>
          <div class="space-y-6">
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">岗位要求</label>
              <textarea formControlName="requirements" rows="5" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="列出岗位要求、技能和条件"></textarea>
            </div>

            <div>
              <label class="mb-2 block text-sm font-medium text-slate-700">岗位描述</label>
              <textarea formControlName="description" rows="8" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-[#1A365D]" placeholder="描述工作内容、协作方式和岗位亮点"></textarea>
            </div>
          </div>
        </section>

        <section *ngIf="jdResult" class="rounded-2xl border border-blue-100 bg-blue-50 p-6">
          <h3 class="text-lg font-bold text-[#1A365D]">最近一次生成结果</h3>
          <p class="mt-2 text-sm text-slate-600">{{ jdResult.highlights || '已生成并填充到表单，可继续手动调整。' }}</p>
        </section>

        <div class="flex justify-end gap-3">
          <button type="button" routerLink="/employer/jobs" class="rounded-xl border border-slate-200 px-5 py-3 text-sm font-medium text-slate-600 hover:bg-slate-50">
            取消
          </button>
          <button type="submit" [disabled]="isSubmitting || loading" class="rounded-xl bg-[#1A365D] px-6 py-3 text-sm font-semibold text-white hover:opacity-90 disabled:opacity-50">
            {{ isSubmitting ? (isEditMode ? '保存中...' : '发布中...') : (isEditMode ? '保存修改' : '发布岗位') }}
          </button>
        </div>
      </form>
    </div>
  </main>
</div>
