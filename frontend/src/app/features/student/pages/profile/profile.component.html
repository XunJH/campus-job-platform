<div class="profile-page">
  <h1>个人中心</h1>
  
  <div *ngIf="message" class="message">{{ message }}</div>
  <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" formControlName="nickname" [readonly]="!isEditing" />
    </div>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" formControlName="email" [readonly]="!isEditing" />
    </div>
    <div class="form-group">
      <label>手机号</label>
      <input type="text" formControlName="phone" [readonly]="!isEditing" />
    </div>
    <div class="form-group">
      <label>头像 URL</label>
      <input type="text" formControlName="avatar" [readonly]="!isEditing" />
      <img *ngIf="profileForm.value.avatar" [src]="profileForm.value.avatar" alt="头像" class="avatar-preview" />
    </div>
    <div class="form-group">
      <label>个人简介</label>
      <textarea formControlName="bio" [readonly]="!isEditing"></textarea>
    </div>
    <div class="actions">
      <button type="button" (click)="toggleEdit()">
        {{ isEditing ? '取消' : '编辑' }}
      </button>
      <button type="submit" *ngIf="isEditing" [disabled]="isLoading">
        {{ isLoading ? '保存中...' : '保存' }}
      </button>
    </div>
  </form>
  <a routerLink="/student/jobs">返回首页</a>
</div>
