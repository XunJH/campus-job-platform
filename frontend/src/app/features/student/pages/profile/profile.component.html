<div class="page-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 7v10l8 5 8-5V7L12 2z" fill="currentColor" />
        </svg>
        <span>CampusJob</span>
      </div>
    </div>

    <div class="sidebar-content">
      <nav class="nav-section">
        <a routerLink="/student/jobs" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect width="7" height="9" x="3" y="3" rx="1"/>
            <rect width="7" height="5" x="14" y="3" rx="1"/>
            <rect width="7" height="9" x="14" y="12" rx="1"/>
            <rect width="7" height="5" x="3" y="16" rx="1"/>
          </svg>
          <span>岗位浏览</span>
          <span class="badge badge-beta">BETA</span>
        </a>
        <a routerLink="/student/applications" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" x2="8" y1="13" y2="13"/>
            <line x1="16" x2="8" y1="17" y2="17"/>
            <line x1="10" x2="8" y1="9" y2="9"/>
          </svg>
          <span>我的申请</span>
        </a>
        <a routerLink="/student/favorites" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          </svg>
          <span>收藏岗位</span>
        </a>
      </nav>

      <div class="nav-divider"></div>

      <nav class="nav-section">
        <p class="nav-label">个人中心</p>
        <a routerLink="/student/profile" class="nav-item active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>个人资料</span>
        </a>
        <a routerLink="/student/resume" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>简历管理</span>
        </a>
        <a routerLink="/student/wallet" class="nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/>
            <path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/>
            <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>
          </svg>
          <span>我的钱包</span>
        </a>
      </nav>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" x2="9" y1="12" y2="12"/>
        </svg>
        <span>退出登录</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="page-header">
      <h1>个人资料</h1>
      <div class="header-actions">
        <button class="btn btn-outline" (click)="toggleEdit()" *ngIf="!isEditing">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
          </svg>
          编辑资料
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="content-area">
      <!-- Success Message -->
      <div class="message message-success" *ngIf="message && !error">
        {{ message }}
      </div>
      <div class="message message-error" *ngIf="message && error">
        {{ message }}
      </div>

      <!-- Profile Card -->
      <div class="profile-card">
        <!-- Avatar Section -->
        <div class="avatar-section">
          <div class="avatar-wrapper">
            <img 
              *ngIf="profileForm.value.avatar" 
              [src]="profileForm.value.avatar" 
              alt="头像" 
              class="avatar-image"
            />
            <div class="avatar-placeholder" *ngIf="!profileForm.value.avatar">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <button class="avatar-edit-btn" *ngIf="isEditing">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" x2="12" y1="3" y2="15"/>
              </svg>
            </button>
          </div>
          <h2 class="user-name">{{ profileForm.value.nickname || '用户' }}</h2>
          <p class="user-role">学生用户</p>
        </div>

        <!-- Form Section -->
        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="profile-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="nickname">用户名</label>
              <input 
                type="text" 
                id="nickname"
                formControlName="nickname"
                placeholder="请输入用户名"
                [readonly]="!isEditing"
              >
            </div>

            <div class="form-group">
              <label for="email">邮箱</label>
              <input 
                type="email" 
                id="email"
                formControlName="email"
                placeholder="请输入邮箱"
                [readonly]="!isEditing"
              >
            </div>

            <div class="form-group">
              <label for="phone">手机号</label>
              <input 
                type="text" 
                id="phone"
                formControlName="phone"
                placeholder="请输入手机号"
                [readonly]="!isEditing"
              >
            </div>

            <div class="form-group">
              <label for="avatar">头像 URL</label>
              <input 
                type="text" 
                id="avatar"
                formControlName="avatar"
                placeholder="请输入头像图片链接"
                [readonly]="!isEditing"
              >
            </div>
          </div>

          <div class="form-group full-width">
            <label for="bio">个人简介</label>
            <textarea 
              id="bio"
              formControlName="bio"
              placeholder="介绍一下你自己..."
              rows="4"
              [readonly]="!isEditing"
            ></textarea>
          </div>

          <!-- Form Actions -->
          <div class="form-actions" *ngIf="isEditing">
            <button type="button" class="btn btn-outline" (click)="toggleEdit()">
              取消
            </button>
            <button type="submit" class="btn btn-primary" [disabled]="isLoading">
              <span *ngIf="!isLoading">保存修改</span>
              <span *ngIf="isLoading">保存中...</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value">12</span>
            <span class="stat-label">已申请</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon green">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value">5</span>
            <span class="stat-label">已通过</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon yellow">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value">3</span>
            <span class="stat-label">待审核</span>
          </div>
        </div>

        <div class="stat-card">
          <div class="stat-icon purple">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value">8</span>
            <span class="stat-label">已收藏</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
