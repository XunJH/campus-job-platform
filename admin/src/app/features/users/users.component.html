<div class="users-container">
  <mat-card class="users-card">
    <mat-card-header>
      <div class="header-content">
        <div>
          <mat-card-title>用户管理</mat-card-title>
          <mat-card-subtitle>管理平台用户账号</mat-card-subtitle>
        </div>
        <button mat-raised-button color="warn" (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          登出
        </button>
      </div>
    </mat-card-header>
    <mat-card-content>
      <div class="users-table-container">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
            <td mat-cell *matCellDef="let user">{{ user.id }}</td>
          </ng-container>

          <ng-container matColumnDef="username">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>用户名</th>
            <td mat-cell *matCellDef="let user">{{ user.username }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>邮箱</th>
            <td mat-cell *matCellDef="let user">{{ user.email }}</td>
          </ng-container>

          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>角色</th>
            <td mat-cell *matCellDef="let user">
              <span class="role-badge" [ngClass]="user.role">{{ user.role === 'student' ? '学生' : user.role === 'employer' ? '雇主' : '管理员' }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>状态</th>
            <td mat-cell *matCellDef="let user">
              <span class="status-badge" [ngClass]="user.status">{{ user.status === 'active' ? '活跃' : user.status === 'inactive' ? '非活跃' : '禁用' }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>操作</th>
            <td mat-cell *matCellDef="let user">
              <button mat-icon-button color="primary" (click)="viewUser(user)">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button [color]="user.status === 'active' ? 'warn' : 'primary'" (click)="toggleStatus(user)">
                <mat-icon>{{ user.status === 'active' ? 'block' : 'check_circle' }}</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteUser(user.id)" [disabled]="user.role === 'admin'">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
