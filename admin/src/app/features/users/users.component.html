<h1 class="text-xl font-semibold text-gray-900 mb-5">用户管理</h1>

<div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-6">
  <div class="flex flex-wrap items-center gap-3 mb-5">
    <input
      type="text"
      [(ngModel)]="searchText"
      (keyup.enter)="onSearch()"
      placeholder="搜索用户名/邮箱"
      class="w-full sm:w-64 h-10 px-4 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-gray-400 transition-colors"
    />
    <button
      (click)="onSearch()"
      class="inline-flex items-center justify-center h-10 px-5 rounded-full bg-gray-900 text-white text-sm font-medium hover:bg-black transition-colors"
    >
      搜索
    </button>
  </div>

  <div class="overflow-x-auto">
    <table mat-table [dataSource]="users" class="w-full">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let user">{{ user.id }}</td>
      </ng-container>

      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>用户名</th>
        <td mat-cell *matCellDef="let user">{{ user.username }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>邮箱</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>角色</th>
        <td mat-cell *matCellDef="let user">{{ getRoleText(user.role) }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>状态</th>
        <td mat-cell *matCellDef="let user">
          <span [ngClass]="getStatusClass(user.status)">{{ getStatusText(user.status) }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let user">
          <div class="flex items-center gap-2">
            <button
              (click)="toggleStatus(user)"
              class="inline-flex items-center justify-center h-8 px-3 rounded-lg text-xs font-medium text-gray-700 hover:bg-gray-100 transition-colors"
            >
              {{ user.status === 'active' ? '禁用' : '启用' }}
            </button>
            <button
              (click)="deleteUser(user.id, user.username)"
              class="inline-flex items-center justify-center h-8 px-3 rounded-lg text-xs font-medium bg-red-50 text-red-600 hover:bg-red-100 transition-colors"
            >
              删除
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="users.length === 0 && !isLoading" class="text-center py-12 text-gray-400 text-sm">
      暂无用户数据
    </div>
  </div>

  <mat-paginator
    [length]="total"
    [pageSize]="limit"
    [pageSizeOptions]="[5, 10, 20, 50]"
    (page)="onPageChange($event)"
    showFirstLastButtons>
  </mat-paginator>
</div>
