<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl border border-gray-100 p-8 md:p-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-900 text-white flex items-center justify-center">
        <mat-icon class="text-[32px] w-[32px] h-[32px]">school</mat-icon>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">校园兼职平台</h1>
      <p class="text-sm text-gray-500 mt-1">管理后台登录</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">管理员账号</label>
        <div class="relative">
          <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px] w-[20px] h-[20px]">person_outline</mat-icon>
          <input
            type="text"
            formControlName="username"
            placeholder="请输入用户名"
            autocomplete="username"
            class="w-full h-11 pl-10 pr-4 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-gray-400 transition-colors"
          />
        </div>
        <div class="mt-1.5 text-xs text-red-600" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
          用户名不能为空
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">密码</label>
        <div class="relative">
          <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[20px] w-[20px] h-[20px]">lock_outline</mat-icon>
          <input
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="请输入密码"
            autocomplete="current-password"
            class="w-full h-11 pl-10 pr-10 border border-gray-200 rounded-xl text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-gray-400 transition-colors"
          />
          <button
            type="button"
            (click)="hidePassword = !hidePassword"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 p-1"
          >
            <mat-icon class="text-[18px] w-[18px] h-[18px]">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <div class="mt-1.5 text-xs text-red-600" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          <span *ngIf="loginForm.get('password')?.hasError('required')">密码不能为空</span>
          <span *ngIf="loginForm.get('password')?.hasError('minlength')">密码至少6位</span>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full h-11 rounded-full bg-gray-900 text-white text-sm font-medium hover:bg-black disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
      >
        <span *ngIf="isLoading">登录中...</span>
        <span *ngIf="!isLoading">登 录</span>
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-xs text-gray-400">© 2024 校园兼职平台 · 仅供管理员使用</p>
    </div>
  </div>
</div>
