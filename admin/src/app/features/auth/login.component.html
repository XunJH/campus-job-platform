<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>管理员登录</mat-card-title>
      <mat-card-subtitle>校园兼职平台管理系统</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <mat-form-field appearance="outline">
            <mat-label>用户名</mat-label>
            <input matInput formControlName="username" required>
            <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
              用户名不能为空
            </mat-error>
          </mat-form-field>
        </div>
        <div class="form-group">
          <mat-form-field appearance="outline">
            <mat-label>密码</mat-label>
            <input matInput type="password" formControlName="password" required>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
              密码不能为空
            </mat-error>
          </mat-form-field>
        </div>
        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" (click)="onSubmit()">
        <span *ngIf="isLoading">登录中...</span>
        <span *ngIf="!isLoading">登录</span>
      </button>
    </mat-card-actions>
  </mat-card>
</div>
