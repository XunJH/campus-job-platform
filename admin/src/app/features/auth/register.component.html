<div class="register-container">
  <div class="register-card">
    <h2>管理员注册</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!-- 用户名 -->
      <div class="form-group">
        <label for="username">用户名</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username" 
          class="form-control"
          placeholder="请输入用户名"
        >
        <div *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched" class="error-message">
          <div *ngIf="registerForm.get('username')?.errors?.['required']">
            用户名不能为空
          </div>
          <div *ngIf="registerForm.get('username')?.errors?.['minlength']">
            用户名至少需要3个字符
          </div>
          <div *ngIf="registerForm.get('username')?.errors?.['maxlength']">
            用户名最多50个字符
          </div>
        </div>
      </div>

      <!-- 邮箱 -->
      <div class="form-group">
        <label for="email">邮箱</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control"
          placeholder="请输入邮箱"
        >
        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error-message">
          <div *ngIf="registerForm.get('email')?.errors?.['required']">
            邮箱不能为空
          </div>
          <div *ngIf="registerForm.get('email')?.errors?.['email']">
            请输入有效的邮箱地址
          </div>
        </div>
      </div>

      <!-- 密码 -->
      <div class="form-group">
        <label for="password">密码</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control"
          placeholder="请输入密码"
        >
        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error-message">
          <div *ngIf="registerForm.get('password')?.errors?.['required']">
            密码不能为空
          </div>
          <div *ngIf="registerForm.get('password')?.errors?.['minlength']">
            密码至少需要6个字符
          </div>
        </div>
      </div>

      <!-- 角色 -->
      <div class="form-group">
        <label for="role">角色</label>
        <select 
          id="role" 
          formControlName="role" 
          class="form-control"
        >
          <option value="admin">管理员</option>
        </select>
      </div>

      <!-- 错误信息 -->
      <div *ngIf="errorMessage" class="error-message alert alert-danger">
        {{ errorMessage }}
      </div>

      <!-- 成功信息 -->
      <div *ngIf="successMessage" class="success-message alert alert-success">
        {{ successMessage }}
      </div>

      <!-- 提交按钮 -->
      <button 
        type="submit" 
        class="btn btn-primary btn-block"
        [disabled]="isLoading"
      >
        {{ isLoading ? '注册中...' : '注册' }}
      </button>
    </form>

    <!-- 登录链接 -->
    <div class="login-link">
      已有账号？<a routerLink="/login">去登录</a>
    </div>
  </div>
</div>
