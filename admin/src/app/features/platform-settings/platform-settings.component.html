<div class="mx-auto max-w-7xl space-y-6">
  <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div>
      <h2 class="text-3xl font-black text-primary">平台配置中心</h2>
      <p class="mt-2 text-sm leading-6 text-secondary">
        统一维护岗位标签、敏感词、AI 风控阈值、功能开关和运营规则，减少后续改代码的成本。
      </p>
    </div>

    <div class="flex items-center gap-3">
      <span *ngIf="lastUpdatedAt" class="text-xs text-gray-400">最近更新：{{ lastUpdatedAt | date: 'yyyy-MM-dd HH:mm' }}</span>
      <button
        type="button"
        (click)="save()"
        [disabled]="isSaving || isLoading"
        class="inline-flex items-center gap-2 rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition-all hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60"
      >
        <span class="material-symbols-outlined text-base">{{ isSaving ? 'hourglass_top' : 'save' }}</span>
        {{ isSaving ? '保存中...' : '保存配置' }}
      </button>
    </div>
  </div>

  <div *ngIf="isLoading" class="flex items-center justify-center py-20">
    <div class="h-8 w-8 animate-spin rounded-full border-b-2 border-primary"></div>
  </div>

  <ng-container *ngIf="!isLoading">
    <div class="grid grid-cols-1 gap-6 xl:grid-cols-[1.15fr_0.85fr]">
      <div class="space-y-6">
        <div class="rounded-2xl bg-white p-6 shadow-card">
          <h3 class="text-xl font-black text-primary">岗位与标签配置</h3>
          <p class="mt-1 text-sm text-secondary">每行一个选项，保存后可作为平台统一的标签基线。</p>

          <div class="mt-5 grid grid-cols-1 gap-5 lg:grid-cols-2">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-primary">岗位类别</span>
              <textarea
                [(ngModel)]="form.jobCategoriesText"
                rows="8"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-primary outline-none transition-all focus:border-primary focus:bg-white"
                placeholder="技术类&#10;教学类&#10;运营类"
              ></textarea>
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-primary">办公形式</span>
              <textarea
                [(ngModel)]="form.workLocationOptionsText"
                rows="8"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-primary outline-none transition-all focus:border-primary focus:bg-white"
                placeholder="校内&#10;远程&#10;混合"
              ></textarea>
            </label>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-6 shadow-card">
          <h3 class="text-xl font-black text-primary">敏感词与风控阈值</h3>
          <p class="mt-1 text-sm text-secondary">敏感词支持换行录入，阈值越高说明触发高风险的标准越严格。</p>

          <div class="mt-5 grid grid-cols-1 gap-5 lg:grid-cols-[1.15fr_0.85fr]">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-primary">敏感词清单</span>
              <textarea
                [(ngModel)]="form.sensitiveWordsText"
                rows="10"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-primary outline-none transition-all focus:border-primary focus:bg-white"
                placeholder="押金&#10;刷单&#10;银行卡"
              ></textarea>
            </label>

            <div class="space-y-4">
              <label class="block rounded-2xl bg-slate-50 p-4">
                <span class="block text-sm font-semibold text-primary">认证高风险阈值</span>
                <input
                  [(ngModel)]="form.verificationHighRisk"
                  type="number"
                  min="0"
                  max="100"
                  class="mt-3 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-primary outline-none focus:border-primary"
                />
              </label>

              <label class="block rounded-2xl bg-slate-50 p-4">
                <span class="block text-sm font-semibold text-primary">岗位高风险阈值</span>
                <input
                  [(ngModel)]="form.jobHighRisk"
                  type="number"
                  min="0"
                  max="100"
                  class="mt-3 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-primary outline-none focus:border-primary"
                />
              </label>

              <label class="block rounded-2xl bg-slate-50 p-4">
                <span class="block text-sm font-semibold text-primary">聊天提醒阈值</span>
                <input
                  [(ngModel)]="form.conversationWarningRisk"
                  type="number"
                  min="0"
                  max="100"
                  class="mt-3 w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-primary outline-none focus:border-primary"
                />
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="space-y-6">
        <div class="rounded-2xl bg-white p-6 shadow-card">
          <h3 class="text-xl font-black text-primary">功能开关</h3>
          <p class="mt-1 text-sm text-secondary">用于控制高频功能是否开放，适合灰度或紧急收口。</p>

          <div class="mt-5 space-y-3">
            <label class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
              <div>
                <p class="text-sm font-semibold text-primary">一键批量投递</p>
                <p class="mt-1 text-xs text-secondary">控制学生端批量投递入口</p>
              </div>
              <input [(ngModel)]="form.enableBatchApply" type="checkbox" class="h-5 w-5 accent-primary" />
            </label>

            <label class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
              <div>
                <p class="text-sm font-semibold text-primary">AI 助手</p>
                <p class="mt-1 text-xs text-secondary">控制学生端和企业端 AI 功能</p>
              </div>
              <input [(ngModel)]="form.enableAiAssistant" type="checkbox" class="h-5 w-5 accent-primary" />
            </label>

            <label class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
              <div>
                <p class="text-sm font-semibold text-primary">申诉工单</p>
                <p class="mt-1 text-xs text-secondary">控制学生端、企业端申诉入口</p>
              </div>
              <input [(ngModel)]="form.enableAppeals" type="checkbox" class="h-5 w-5 accent-primary" />
            </label>

            <label class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
              <div>
                <p class="text-sm font-semibold text-primary">投递前必须上传简历图</p>
                <p class="mt-1 text-xs text-secondary">控制学生申请岗位前的资料要求</p>
              </div>
              <input [(ngModel)]="form.requireResumeImageBeforeApply" type="checkbox" class="h-5 w-5 accent-primary" />
            </label>

            <label class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3">
              <div>
                <p class="text-sm font-semibold text-primary">聊天未读提醒</p>
                <p class="mt-1 text-xs text-secondary">控制沟通渠道的消息提醒行为</p>
              </div>
              <input [(ngModel)]="form.enableConversationReminder" type="checkbox" class="h-5 w-5 accent-primary" />
            </label>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-6 shadow-card">
          <h3 class="text-xl font-black text-primary">运营规则</h3>
          <p class="mt-1 text-sm text-secondary">这里控制批量上限、报表观察周期和工单响应时效。</p>

          <div class="mt-5 space-y-4">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-primary">批量投递上限</span>
              <input
                [(ngModel)]="form.batchApplyLimit"
                type="number"
                min="1"
                max="500"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-primary outline-none focus:border-primary focus:bg-white"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-primary">报表默认观察天数</span>
              <input
                [(ngModel)]="form.reportWindowDays"
                type="number"
                min="1"
                max="90"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-primary outline-none focus:border-primary focus:bg-white"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-primary">工单响应时效（小时）</span>
              <input
                [(ngModel)]="form.ticketResponseHours"
                type="number"
                min="1"
                max="168"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-primary outline-none focus:border-primary focus:bg-white"
              />
            </label>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</div>
