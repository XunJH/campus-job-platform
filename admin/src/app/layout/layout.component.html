<div class="flex min-h-screen bg-gray-50">
  <!-- 侧边栏 -->
  <aside class="w-56 shrink-0 border-r border-gray-100 bg-white flex flex-col h-screen sticky top-0">
    <div class="h-14 flex items-center gap-2.5 px-5 border-b border-gray-100">
      <mat-icon class="text-gray-900">school</mat-icon>
      <span class="font-semibold text-[15px] text-gray-900 tracking-tight">校园兼职平台</span>
    </div>
    <nav class="p-3 space-y-0.5 overflow-y-auto">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-blue-50 text-blue-700"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
      >
        <mat-icon class="text-[18px] w-[18px] h-[18px]">{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <!-- 主内容区 -->
  <div class="flex-1 flex flex-col min-w-0">
    <header class="h-14 bg-white border-b border-gray-100 flex items-center justify-between px-6 shrink-0 sticky top-0 z-20">
      <h2 class="text-base font-semibold text-gray-900">{{ getTitle() }}</h2>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 text-sm text-gray-600">
          <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
            <mat-icon class="text-[18px] w-[18px] h-[18px]">account_circle</mat-icon>
          </div>
          <span class="font-medium">{{ username }}</span>
        </div>
        <button
          (click)="logout()"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-200 text-gray-600 hover:border-red-300 hover:text-red-600 transition-colors"
        >
          <mat-icon class="text-[14px] w-[14px] h-[14px]">logout</mat-icon>
          退出
        </button>
      </div>
    </header>
    <main class="flex-1 p-6 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
