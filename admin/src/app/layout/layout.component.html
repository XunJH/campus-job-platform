<div class="flex min-h-screen bg-background text-on-surface font-sans">
  <!-- Sidebar -->
  <aside class="fixed left-0 top-0 h-screen w-64 border-r border-gray-100 bg-white shadow-[4px_0_6px_-1px_rgba(26,54,93,0.05)] flex flex-col p-4 gap-2 z-50">
    <div class="flex items-center gap-3 px-2 py-4 mb-4">
      <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center text-white">
        <span class="material-symbols-outlined">admin_panel_settings</span>
      </div>
      <div>
        <h1 class="text-lg font-black text-primary">管理后台</h1>
        <p class="text-[10px] uppercase tracking-wider font-bold text-gray-400">管理员入口</p>
      </div>
    </div>

    <nav class="flex-1 flex flex-col gap-1">
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="bg-blue-50 text-primary"
         class="flex items-center gap-3 px-3 py-2.5 text-gray-500 hover:bg-gray-50 hover:translate-x-1 transition-all rounded-lg font-semibold text-sm">
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <div class="pt-4 border-t border-gray-50 flex flex-col gap-1">
      <button (click)="logout()"
        class="flex items-center gap-3 px-3 py-2.5 text-error hover:bg-red-50 transition-all rounded-lg font-semibold text-sm w-full text-left">
        <span class="material-symbols-outlined">logout</span>
        退出登录
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="ml-64 flex-1 flex flex-col min-w-0 min-h-screen">
    <!-- Top Header -->
    <header class="sticky top-0 w-full bg-white border-b border-gray-100 z-40">
      <div class="flex justify-between items-center h-16 px-6 w-full max-w-7xl mx-auto">
        <div class="flex items-center gap-8">
          <span class="text-xl font-bold text-primary">校园招聘管理平台</span>
        </div>
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 text-sm text-gray-600">
            <div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-gray-500">
              <span class="material-symbols-outlined text-[18px]">account_circle</span>
            </div>
            <span class="font-medium">{{ username }}</span>
          </div>
          <button (click)="logout()"
            class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg border border-gray-200 text-gray-600 hover:border-red-300 hover:text-red-600 transition-colors">
            <span class="material-symbols-outlined text-[14px]">logout</span>
            退出
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 p-6 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
