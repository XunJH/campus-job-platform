<div class="flex min-h-screen bg-background font-sans text-on-surface">
  <aside class="fixed left-0 top-0 z-50 flex h-screen w-64 flex-col gap-2 border-r border-gray-100 bg-white p-4 shadow-[4px_0_6px_-1px_rgba(26,54,93,0.05)]">
    <div class="mb-4 flex items-center gap-3 px-2 py-4">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
        <span class="material-symbols-outlined">admin_panel_settings</span>
      </div>
      <div>
        <h1 class="text-lg font-black text-primary">管理后台</h1>
        <p class="text-[10px] font-bold uppercase tracking-wider text-gray-400">ADMIN CONSOLE</p>
      </div>
    </div>

    <nav class="flex flex-1 flex-col gap-1">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-blue-50 text-primary"
        class="flex items-center justify-between rounded-lg px-3 py-2.5 text-sm font-semibold text-gray-500 transition-all hover:bg-gray-50 hover:translate-x-1"
      >
        <span class="flex items-center gap-3">
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </span>
        <span *ngIf="getBadge(item)" class="inline-flex min-w-[22px] items-center justify-center rounded-full bg-rose-500 px-1.5 py-0.5 text-[11px] font-semibold leading-none text-white">
          {{ getBadge(item) }}
        </span>
      </a>
    </nav>

    <div class="border-t border-gray-50 pt-4">
      <button
        type="button"
        (click)="logout()"
        class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm font-semibold text-error transition-all hover:bg-red-50"
      >
        <span class="material-symbols-outlined">logout</span>
        退出登录
      </button>
    </div>
  </aside>

  <div class="ml-64 flex min-h-screen min-w-0 flex-1 flex-col">
    <header class="sticky top-0 z-40 w-full border-b border-gray-100 bg-white">
      <div class="mx-auto flex h-16 w-full max-w-7xl items-center justify-between px-6">
        <div class="flex items-center gap-8">
          <span class="text-xl font-bold text-primary">校园招聘管理平台</span>
          <span class="hidden text-sm text-gray-400 md:inline">{{ getTitle() }}</span>
        </div>
        <div class="flex items-center gap-4">
          <a
            routerLink="/notifications"
            class="relative flex h-9 w-9 items-center justify-center rounded-full border border-slate-200 bg-slate-50 text-primary no-underline"
            title="系统通知"
          >
            <span class="material-symbols-outlined text-[18px]">notifications</span>
            <span *ngIf="unreadNotificationCount > 0" class="absolute -right-1 -top-1 inline-flex min-h-[18px] min-w-[18px] items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-semibold leading-none text-white">
              {{ unreadNotificationCount > 99 ? '99+' : unreadNotificationCount }}
            </span>
          </a>
          <div class="flex items-center gap-2 text-sm text-gray-600">
            <div class="flex h-8 w-8 items-center justify-center rounded-full bg-surface-container text-gray-500">
              <span class="material-symbols-outlined text-[18px]">account_circle</span>
            </div>
            <span class="font-medium">{{ username }}</span>
          </div>
          <button
            type="button"
            (click)="logout()"
            class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 px-3 py-1.5 text-xs font-medium text-gray-600 transition-colors hover:border-red-300 hover:text-red-600"
          >
            <span class="material-symbols-outlined text-[14px]">logout</span>
            退出
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
